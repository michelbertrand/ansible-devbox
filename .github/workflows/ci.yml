name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Linting

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install dependencies
        run: |
          pip install 'ansible>=10.0,<11.0' 'ansible-lint>=24.0,<25.0' 'yamllint>=1.35,<2.0'

      - name: Run ansible-lint
        run: ansible-lint ansible/
        continue-on-error: false

      - name: Run yamllint
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 120}}}' \
            ansible/playbooks/*.yml \
            ansible/inventory/*.yml \
            ansible/inventory/group_vars/*.yml \
            $(find ansible/roles -name '*.yml' -type f)
        continue-on-error: false

  syntax-check:
    runs-on: ubuntu-latest
    name: Syntax Check
    needs: lint

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Ansible
        run: pip install 'ansible>=10.0,<11.0'

      - name: Run syntax check
        run: |
          ansible-playbook ansible/playbooks/site.yml \
            --inventory ansible/inventory/hosts.ini \
            --syntax-check

  dry-run:
    runs-on: ubuntu-latest
    name: Dry Run
    needs: syntax-check

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Ansible
        run: pip install 'ansible>=10.0,<11.0'

      - name: Run playbook in check mode
        run: |
          ansible-playbook ansible/playbooks/site.yml \
            --inventory ansible/inventory/hosts.ini \
            --check
        continue-on-error: false

  molecule:
    runs-on: ubuntu-latest
    name: Molecule (${{ matrix.role }})
    needs: syntax-check
    strategy:
      matrix:
        role:
          - git
          - python
          - go
          - openjdk
          - maven
          - gradle
          - terraform
          - kubectl
          - minikube
          - docker
          - ohmyzsh
          - kube_ps1
          - terminator
          - sublime_text
          - mysql
          - mongodb
      fail-fast: false

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Molecule and dependencies
        run: pip install 'ansible>=10.0,<11.0' 'molecule>=6.0,<7.0' 'molecule-plugins[docker]'

      - name: Run Molecule tests
        run: molecule test
        working-directory: ansible/roles/${{ matrix.role }}
