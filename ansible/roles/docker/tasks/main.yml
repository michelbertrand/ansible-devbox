---
- name: Install required packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Check if Docker GPG key is installed
  stat:
    path: /etc/apt/keyrings/docker.gpg
  register: docker_gpg_stat

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /root/.docker.gpg.asc
    mode: "0600"
    checksum: "{{ docker_gpg_checksum }}"
  retries: 3
  delay: 5
  when: not docker_gpg_stat.stat.exists

- name: Verify Docker GPG key fingerprint
  shell: |
    tmpring=$(mktemp)
    gpg --no-default-keyring --keyring "${tmpring}" \
        --import /root/.docker.gpg.asc 2>/dev/null
    result=$(gpg --no-default-keyring --keyring "${tmpring}" \
        --fingerprint 2>/dev/null | tr -d ' ')
    rm -f "${tmpring}" "${tmpring}~"
    echo "${result}" | grep -qF "{{ docker_gpg_fingerprint | replace(' ', '') }}"
  args:
    executable: /bin/bash
  changed_when: false
  register: docker_fp_check
  failed_when: docker_fp_check.rc != 0
  when: not docker_gpg_stat.stat.exists

- name: Dearmor Docker GPG key
  command: gpg --batch --dearmor -o /etc/apt/keyrings/docker.gpg /root/.docker.gpg.asc
  when: not docker_gpg_stat.stat.exists

- name: Remove temporary Docker GPG key
  file:
    path: /root/.docker.gpg.asc
    state: absent

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker packages
  block:
    - name: Install Docker with optional plugins
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
  rescue:
    - name: Install Docker core packages (plugins unavailable on this release)
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

- name: Start Docker service
  systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true

- name: Add user to docker group
  user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: true

- name: Verify Docker installation
  command: docker --version
  changed_when: false

- name: Verify Docker Compose installation
  command: docker compose version
  changed_when: false
