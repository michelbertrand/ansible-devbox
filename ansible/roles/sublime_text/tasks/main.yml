---
- name: Remove legacy Sublime Text GPG key
  file:
    path: /usr/share/keyrings/sublimehq.gpg
    state: absent

- name: Remove conflicting Sublime Text apt source files
  shell: |
    find /etc/apt/sources.list.d/ \( -name "*.list" -o -name "*.sources" \) \
      -not -name "sublime-text.list" \
      -exec grep -l "download.sublimetext.com" {} \; \
      | xargs -r rm -f
    sed -i '/download.sublimetext.com/d' /etc/apt/sources.list
  changed_when: false

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Check if Sublime Text GPG key is installed
  stat:
    path: /etc/apt/keyrings/sublime-text.gpg
  register: sublime_gpg_stat

- name: Download Sublime Text GPG key
  get_url:
    url: "https://download.sublimetext.com/sublimehq-pub.gpg"
    dest: "/root/.sublimehq-pub.gpg.asc"
    mode: "0600"
  retries: 3
  delay: 5
  when: not sublime_gpg_stat.stat.exists

- name: Verify Sublime Text GPG key fingerprint
  shell: |
    tmpring=$(mktemp)
    gpg --no-default-keyring --keyring "${tmpring}" \
        --import /root/.sublimehq-pub.gpg.asc 2>/dev/null
    result=$(gpg --no-default-keyring --keyring "${tmpring}" \
        --fingerprint 2>/dev/null | tr -d ' ')
    rm -f "${tmpring}" "${tmpring}~"
    echo "${result}" | grep -qF "{{ sublime_text_gpg_fingerprint | replace(' ', '') }}"
  args:
    executable: /bin/bash
  changed_when: false
  register: sublime_fp_check
  failed_when: sublime_fp_check.rc != 0
  when: not sublime_gpg_stat.stat.exists

- name: Dearmor Sublime Text GPG key
  command: gpg --batch --dearmor -o /etc/apt/keyrings/sublime-text.gpg /root/.sublimehq-pub.gpg.asc
  when: not sublime_gpg_stat.stat.exists

- name: Remove temporary Sublime Text GPG key
  file:
    path: /root/.sublimehq-pub.gpg.asc
    state: absent

- name: Add Sublime Text repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/sublime-text.gpg] https://download.sublimetext.com/ apt/stable/"
    state: present
    filename: sublime-text
    update_cache: false

- name: Update apt cache after adding repository
  apt:
    update_cache: true

- name: Install Sublime Text
  apt:
    name: sublime-text
    state: "{{ sublime_text_version }}"
  register: sublime_install
  changed_when: sublime_install.changed
